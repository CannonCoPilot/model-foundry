# Grab the VRAM footprint of each model
# See about Nemotron Ultra
# #### Don't forget that each additional model need to switch to 'depends on:base_command'

services:
  # ========================
  # OPENWEBUI (Chat/Agent UI)
  # ========================
  web_commander:
    image: ghcr.io/open-webui/open-webui:main
    container_name: command-web # rename commando-web
    ports:
      - 5151:8080
    environment:
      - OLLAMA_BASE_URL=http://commander-base:11434
      - CUSTOM_THEME=dark-matrix
    volumes:
      - /rhome/nathanielc/llm-stack/webui-themes:/app/webui/themes/custom
      - /rhome/nathanielc/llm-stack/webui-data:/app/backend/data
    networks:
      - llm-network # Use consistent network name
    restart: unless-stopped
  # ========================
  # <Multi-model Image Builder>
  # This service builds a base image that can be used for all models
  # It allows you to set a default model or leave it empty for flexibility
  # ========================

  # docker exec -it commander-base /bin/bash
  # ollama ps
  # NAME                  ID              SIZE     PROCESSOR    UNTIL   
  # deepseek-r1:1.5b      e0979632db5a    3.3 GB    100% GPU     Forever  
  base_command:
    container_name: commander-base
    build:
      context: /rhome/nathanielc/ai8_command_test # Set the context to where your Dockerfile and script are
      dockerfile: dockerfile # Specify the Dockerfile name if it's not "Dockerfile"
      args:
        BUILD_MODEL: deepseek-r1:1.5b # Creates the BUILD_MODEL argument. You can put a default here or leave empty
    image: base_command:latest # Give your built image a name and tag
    environment:
      - BUILD_MODEL=deepseek-r1:1.5b # Default model to build
      - OLLAMA_SCHED_SPREAD=1
      - OLLAMA_NUM_PARALLEL=8
      - OLLAMA_GPU_LAYER_COUNT=999
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_HOST=0.0.0.0
    networks:
      - llm-network # Use consistent network name
    volumes:
      - /rhome/nathanielc/ollama_models/base_models:/root/.ollama:rw
      - /rhome/nathanielc/ollama_data:/data:rw
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://commander-base:11434/
      interval: 600s
      timeout: 10s
      retries: 3
      start_period: 60s
    ports:
      - 11501:11434
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities:
                - gpu
              device_ids:
                - "7"
    restart: unless-stopped
