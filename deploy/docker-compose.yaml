# AI8 Architecture - Unified Docker Compose Configuration
# Base Path: /mnt/ai8_arch
# User: CannonCoPilot
# Date: 2025-10-21
# This file is the single source of truth for the AI8 system deployment.

services:
  # ============================================================
  # PHASE 1: FOUNDATION SERVICES
  # ============================================================
  
  # ========================
  # MONITORING: Prometheus
  # ========================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: llm-prometheus
    ports:
      - "9091:9090"
    volumes:
      - /mnt/ai8_arch/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /mnt/ai8_arch/data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - deploy_llm-network
    restart: unless-stopped
 
  # ========================
  # MONITORING: NVIDIA GPU Exporter
  # ========================
  nvidia_gpu_exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.2.0
    container_name: llm-gpu-exporter
    ports:
      - "9835:9835"
    volumes:
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro
      - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              device_ids: ['0','1','2','3','4','5','6','7']
    networks:
      - deploy_llm-network
    restart: unless-stopped
 
   # ========================
   # MONITORING: Grafana
  # ========================
  grafana:
    image: grafana/grafana:10.2.2
    container_name: llm-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - /mnt/ai8_arch/data/grafana:/var/lib/grafana
      - /mnt/ai8_arch/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - /mnt/ai8_arch/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - deploy_llm-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # ========================
  # DATABASE: PostgreSQL (Main)
  # ========================
  postgres:
    image: postgres:15-alpine
    container_name: llm-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-llmuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-llmpassword}
      - POSTGRES_DB=litellm
    volumes:
      - /mnt/ai8_arch/data/postgres:/var/lib/postgresql/data
      - /mnt/ai8_arch/scripts/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh:ro
    networks:
      - deploy_llm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llmuser} -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
 
  # ========================
  # API GATEWAY: LiteLLM Proxy
  # ========================
  litellm:
    build:
      context: /mnt/ai8_arch
      dockerfile: dockerfiles/Dockerfile.litellm
    container_name: llm-gateway
    user: "0:0"
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/litellm"
      STORE_MODEL_IN_DB: "true"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      LITELLM_LOG: "INFO"
      LITELLM_MIGRATION_DIR: "/app/migrations"
      # PROMETHEUS_API_ENDPOINT: "http://prometheus:9090"
    volumes:
      - /mnt/ai8_arch/config/litellm_config.yaml:/app/config.yaml:ro
      - /mnt/ai8_arch/data/litellm_cache:/home/appuser/.cache
      - /mnt/ai8_arch/data/litellm_migrations:/app/migrations
    working_dir: /app
    networks:
      - deploy_llm-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      gpt-oss-120b:
        condition: service_healthy
      qwen3-omni:
        condition: service_healthy
      embeddings-model:
        condition: service_healthy
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
 
  # ============================================================
  # PHASE 2: DATA LAYER
  # ============================================================
 
  # ========================
  # VECTOR DATABASE: Qdrant
  # ========================
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: llm-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__LOG_LEVEL=INFO
    volumes:
      - /mnt/ai8_arch/data/qdrant:/qdrant/storage
    networks:
      - deploy_llm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
 
  # ========================
  # VECTOR DATABASE: Chroma
  # ========================
  chroma:
    image: chromadb/chroma:0.4.24
    container_name: llm-chroma
    ports:
      - "8000:8000"
    volumes:
      - /mnt/ai8_arch/data/chroma:/chroma/chroma
    networks:
      - deploy_llm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')\""]
      interval: 30s
      timeout: 10s
      retries: 3
 
  # ========================
  # DOCUMENT STORE: MongoDB
  # ========================
  mongodb:
    image: mongo:7.0
    container_name: llm-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-mongopassword}
      - MONGO_INITDB_DATABASE=rag_documents
    volumes:
      - /mnt/ai8_arch/data/mongodb:/data/db
      - /mnt/ai8_arch/data/mongodb_config:/data/configdb
    networks:
      - deploy_llm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mongosh --username ${MONGO_USER:-admin} --password ${MONGO_PASSWORD:-mongopassword} --authenticationDatabase admin --eval \"db.adminCommand('ping')\" --quiet"]
      interval: 30s
      timeout: 10s
      retries: 3
 
  # ========================
  # CACHE: Redis
  # ========================
  redis:
    image: redis:7-alpine
    container_name: llm-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
    volumes:
      - /mnt/ai8_arch/data/redis:/data
    networks:
      - deploy_llm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD?REDIS_PASSWORD must be set} ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
 
  # ============================================================
  # PHASE 3: MODEL SERVICES
  # ============================================================
 
  # ========================
  # CORE MODEL: GPT-OSS-120B
  # ========================
  gpt-oss-120b:
    image: "ghcr.io/huggingface/text-generation-inference:1.4"
    container_name: gpt-oss-120b
    ports:
      - "8081:80"
    env_file:
      - ./.env
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - "/mnt/ai8_arch/models/gpt-oss-120b:/data"
    command: ["--model-id", "{{ .Values.model.mixtral.name }}", "--sharded", "true", "--num-shard", "2"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1', '3']
              capabilities: [gpu]
    networks:
      - deploy_llm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    shm_size: '16gb'
 
  # ========================
  # CORE MODEL: QWEN3-OMNI
  # ========================
  qwen3-omni:
    image: "ghcr.io/huggingface/text-generation-inference:1.4"
    container_name: qwen3-omni
    ports:
      - "8082:80"
    env_file:
      - ./.env
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - "/mnt/ai8_arch/models/qwen3-omni:/data"
    command: ["--model-id", "{{ .Values.model.qwen.name }}", "--sharded", "true", "--num-shard", "2"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['5', '7']
              capabilities: [gpu]
    networks:
      - deploy_llm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    shm_size: '16gb'
 
  # ========================
  # CORE MODEL: EMBEDDINGS
  # ========================
  embeddings-model:
    build:
      context: /mnt/ai8_arch
      dockerfile: dockerfiles/Dockerfile.embeddings
    container_name: embeddings-model
    ports:
      - "8083:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - ./.env
    volumes:
      - "/mnt/ai8_arch/models/huggingface:/app/models"
    environment:
      - OLLAMA_HOST=localhost
      - PRELOAD_MODELS=nomic-embed-text:137m-v1.5-fp16,NovaSearch/jasper_en_vision_language_v1,NovaSearch/stella_en_1.5B_v5,qwen3-embedding:8b-q8_0,embeddinggemma:300m-bf16
      - SENTENCE_TRANSFORMERS_HOME=/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    networks:
      - deploy_llm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
 
  # ========================
  # SECONDARY MODEL: InternVL3.5 (SKIPPED)
  # ========================
  secondary_internvl:
    image: vllm-custom:latest
    container_name: secondary-internvl
    ports:
      - "8002:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command:
      - --model
      - OpenGVLab/InternVL3_5-8B
      - --gpu-memory-utilization
      - "0.85"
      - --max-model-len
      - "4096"
      - --served-model-name
      - internvl3-8b
      - --trust-remote-code
      - --max-num-seqs
      - "8"
    volumes:
      - /mnt/ai8_arch/models/huggingface:/root/.cache/huggingface
    networks:
      - deploy_llm-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['4']
              capabilities: [gpu]
    restart: unless-stopped
    shm_size: '8gb'
    profiles: ["phase3", "all"]
 
  # ========================
  # SECONDARY MODEL: Llava (SKIPPED)
  # ========================
  secondary_llava:
    image: ollama/ollama:0.1.30
    container_name: secondary-llava
    ports:
      - "11602:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=600
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_GPU_LAYER_COUNT=999
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - /mnt/ai8_arch/models/ollama/secondary/llava:/root/.ollama
      - /mnt/ai8_arch/scripts/ollama_lazy_load.sh:/lazy_load.sh:ro
    entrypoint: ["/bin/bash", "/lazy_load.sh", "llava:34b-v1.6-q8_0"]
    networks:
      - deploy_llm-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['5']
              capabilities: [gpu]
    restart: unless-stopped
    profiles: ["phase3", "all"]
 
  # ========================
  # SECONDARY MODEL: GLM-4.6 (SKIPPED)
  # ========================
  secondary_glm4:
    image: vllm-custom:latest
    container_name: secondary-glm4
    ports:
      - "8003:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command:
      - --model
      - zai-org/GLM-4.6-FP8
      - --tensor-parallel-size
      - "4"
      - --gpu-memory-utilization
      - "0.85"
      - --max-model-len
      - "8192"
      - --served-model-name
      - glm-4.6
      - --trust-remote-code
    volumes:
      - /mnt/ai8_arch/models/huggingface:/root/.cache/huggingface
    networks:
      - deploy_llm-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['4','5','6','7']
              capabilities: [gpu]
    restart: unless-stopped
    shm_size: '16gb'
    profiles: ["phase3", "all"]
 
  # ============================================================
  # PHASE 4: USER INTERFACES
  # ============================================================
 
  # ========================
  # OPENWEBUI
  # ========================
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: llm-openwebui
    ports:
      - "5151:8080"
    environment:
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-sk-llm-master-key-2025}
      - WEBUI_AUTH=true
      - ENABLE_OLLAMA_API=false
      - ENABLE_OPENAI_API=true
    volumes:
      - /mnt/ai8_arch/data/openwebui/data:/app/backend/data
    networks:
      - deploy_llm-network
    depends_on:
      - litellm
    restart: unless-stopped
 
  # ========================
  # N8N
  # ========================
  n8n:
    image: n8nio/n8n:latest
    container_name: llm-n8n
    user: "0:0"
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-n8npassword}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://ai8:5678
      - GENERIC_TIMEZONE=America/New_York
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-llmuser}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-llmpassword}
      - N8N_OPENAI_API_BASE_URL=http://litellm:4000/v1
    volumes:
      - /mnt/ai8_arch/data/n8n:/home/node/.n8n
      - /mnt/ai8_arch/n8n/workflows:/home/node/.n8n/workflows
    networks:
      - deploy_llm-network
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_healthy
    restart: unless-stopped
 
  # ============================================================
  # PHASE 5: INTERACTIVE SERVICES
  # ============================================================
 
  # ========================
  # USER PLAYGROUND (Physical GPU 6 - shared with secondary models when not in use)
  # ========================
  user-playground:
    build:
      context: /mnt/ai8_arch
      dockerfile: dockerfiles/Dockerfile.playground
    container_name: user-playground
    user: "0:0"
    ports:
      - "11620:11434" # Ollama
      - "8020:8000"   # vLLM
      - "8888:8888"   # Jupyter
    env_file:
      - ./.env
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=0
    volumes:
      - /mnt/ai8_arch/models/ollama/playground:/root/.ollama
      - /mnt/ai8_arch/models/huggingface:/root/.cache/huggingface
      - /mnt/ai8_arch/logs/playground:/var/log
      - /mnt/ai8_arch/scripts/start_playground.sh:/app/start_playground.sh
      - /mnt/ai8_arch/scripts:/app/scripts
    working_dir: /app
    entrypoint: /app/start_playground.sh
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['6']
              capabilities:
                - gpu
    restart: unless-stopped
    networks:
      - deploy_llm-network
    tty: true
    stdin_open: true
 
 
# ============================================================
# NETWORKS
# ============================================================
networks:
  llm-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
  deploy_llm-network:
    driver: bridge
    ipam:
      config:
        - subnet: "172.29.0.0/16"